name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo run -- test lib/json
      - name: json decoder end-to-end (native, 150 decodes)
        run: |
          cargo build --release
          bash bench/make_jsonbench.sh
          ./target/release/kanso build bench/jsonbench --release
          out=$(./jsonbench)
          echo "$out"
          echo "$out" | grep -q "checksum 24000" \
            || { echo "::error::native json decoder produced the wrong checksum"; exit 1; }
      - name: book samples (every panel executed, outputs verified)
        run: sh scripts/book_check.sh
      - name: cost golden (deterministic performance ratchet, no clocks)
        run: |
          KANSO_COUNTERS=1 ./jsonbench 2>counters.txt >/dev/null
          diff bench/cost_golden.txt counters.txt || {
            echo "::error::cost counters diverged from bench/cost_golden.txt — a"
            echo "::error::performance-relevant change (allocs, arena blocks, beat"
            echo "::error::iterations). If intentional, update the golden in this PR."
            exit 1
          }
      - name: encode cost golden (every kernel's presence counter, pinned)
        run: |
          ./target/release/kanso build bench/encodebench --release >/dev/null
          KANSO_COUNTERS=1 ./encodebench 2>counters_encode.txt >/dev/null
          diff bench/cost_golden_encode.txt counters_encode.txt || {
            echo "::error::encode counters diverged from cost_golden_encode.txt."
            echo "::error::A kernel's presence counter moved — a fast path was"
            echo "::error::dropped, rerouted, or intentionally changed. If"
            echo "::error::intentional, update the golden in this PR."
            exit 1
          }

  # Non-blocking: reports the kanso-vs-serde decode ratio (the optimization
  # campaign's headline metric) to the run summary. CI runners are noisy, so
  # this tracks the number for visibility rather than gating on it.
  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build engines
        run: |
          cargo build --release
          bash bench/make_jsonbench.sh
          ./target/release/kanso build bench/jsonbench --release
          (cd bench/serde_bench && cargo build --release)
      - name: race (best of 3)
        run: |
          best() {
            b=99999
            for i in 1 2 3; do
              t=$( { /usr/bin/time -f '%e' "$@" >/dev/null; } 2>&1 )
              awk -v a="$t" -v b="$b" 'BEGIN{exit !(a<b)}' && b=$t
            done
            echo "$b"
          }
          kanso_wall=$(best ./jsonbench)
          kanso_ms=$(awk -v w="$kanso_wall" 'BEGIN{printf "%.2f", w/150*1000}')
          serde_line=$(./bench/serde_bench/target/release/serde_bench bench/large.json | tail -1)
          {
            echo "## json decode benchmark (188 KB, 150 decodes)"
            echo ""
            echo "| engine | per decode |"
            echo "| --- | --- |"
            echo "| kanso (native) | ${kanso_ms} ms |"
            echo "| serde_json | ${serde_line#serde mean over 150 decodes: } |"
            echo ""
            echo "kanso passed serde on 2026-07-18 (25/25 interleaved rounds locally); runners are noisy, so this table informs rather than gates — the gating perf spec is the cost golden in the test job."
          } >> "$GITHUB_STEP_SUMMARY"
